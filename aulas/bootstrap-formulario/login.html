<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login — y2k edition</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* === CONTAINER GLASSMORPHISM Y2K === */
    .login-box {
      background: rgba(17, 17, 24, 0.8);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 45, 120, 0.3);
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 60px rgba(255, 45, 120, 0.15), inset 0 0 40px rgba(255, 45, 120, 0.03);
      animation: fadeUp 0.8s ease both;
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 45, 120, 0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .login-box > * { position: relative; z-index: 1; }

    /* === TÍTULO === */
    h2 {
      font-weight: 800;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    h2 span {
      color: #ff2d78;
      text-shadow: 0 0 20px rgba(255, 45, 120, 0.6);
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }

    /* === FORM-LABEL (classe Bootstrap obrigatória) === */
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #00f5d4;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }

    /* === FORM-CONTROL (classe Bootstrap obrigatória) === */
    .form-control {
      background: rgba(14, 14, 20, 0.6);
      border: 2px solid rgba(255, 45, 120, 0.3);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-control::placeholder {
      color: rgba(240, 240, 240, 0.3);
    }

    .form-control:hover {
      border-color: rgba(255, 45, 120, 0.5);
      transform: translateY(-1px);
    }

    .form-control:focus {
      background: rgba(14, 14, 20, 0.8);
      border-color: #ff2d78;
      box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.15), 0 0 25px rgba(255, 45, 120, 0.4);
      color: #fff;
      outline: none;
      transform: translateY(-2px);
    }

    /* === VALIDAÇÃO BOOTSTRAP === */
    .form-control.is-invalid {
      border-color: #ff2d78;
      background-image: none;
    }

    .form-control.is-invalid:focus {
      box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.2), 0 0 25px rgba(255, 45, 120, 0.5);
    }

    /* invalid-feedback: classe Bootstrap para mensagem de erro */
    .invalid-feedback {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #ff2d78;
      margin-top: 0.5rem;
      display: none;
    }

    .invalid-feedback.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* === FORM-CHECK (classe Bootstrap obrigatória) === */
    .form-check {
      padding-left: 2rem;
    }

    /* === FORM-CHECK-INPUT (classe Bootstrap obrigatória) === */
    .form-check-input {
      width: 1.2rem;
      height: 1.2rem;
      background-color: rgba(14, 14, 20, 0.6);
      border: 2px solid rgba(0, 245, 212, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .form-check-input:hover {
      border-color: #00f5d4;
      box-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
    }

    .form-check-input:focus {
      border-color: #00f5d4;
      box-shadow: 0 0 0 4px rgba(0, 245, 212, 0.15), 0 0 20px rgba(0, 245, 212, 0.5);
      outline: none;
    }

    .form-check-input:checked {
      background-color: #00f5d4;
      border-color: #00f5d4;
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.6);
      animation: neonPulse 1.5s ease-in-out infinite;
    }

    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 245, 212, 0.6); }
      50% { box-shadow: 0 0 30px rgba(0, 245, 212, 0.9); }
    }

    /* === FORM-CHECK-LABEL (classe Bootstrap obrigatória) === */
    .form-check-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: rgba(240,240,240,0.7);
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .form-check-label:hover {
      color: #00f5d4;
    }

    /* === BOTÃO === */
    .btn-custom {
      background: linear-gradient(135deg, #ff2d78, #ff6b9d);
      border: none;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.9rem;
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 45, 120, 0.3);
    }

    .btn-custom:hover {
      background: linear-gradient(135deg, #ff6b9d, #ff2d78);
      box-shadow: 0 8px 30px rgba(255, 45, 120, 0.5);
      transform: translateY(-3px);
    }

    .btn-custom:active {
      transform: translateY(-1px);
    }

    /* === LINK DE REGISTRO === */
    .register-link {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: rgba(240,240,240,0.6);
      text-align: center;
      margin-top: 2rem;
    }

    .register-link a {
      color: #00f5d4;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .register-link a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 245, 212, 0.8);
    }

    /* === ANIMAÇÕES === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === FOOTER === */
    footer {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(240,240,240,0.3);
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <h2>Login <span>Y2K</span></h2>
    <p class="subtitle">// paola edition — glassmorphism dark</p>

    <!-- novalidate: desabilita validação HTML5 padrão para usar Bootstrap -->
    <form id="loginForm" novalidate>

      <!-- Campo E-mail -->
      <div class="mb-3">
        <!-- form-label: classe Bootstrap obrigatória -->
        <label for="email" class="form-label">e-mail</label>
        <!-- form-control: classe Bootstrap obrigatória -->
        <!-- required: atributo HTML5 para validação -->
        <!-- placeholder: atributo HTML5 para texto de exemplo -->
        <input 
          type="email" 
          class="form-control" 
          id="email" 
          placeholder="seu@email.com" 
          required>
        <!-- invalid-feedback: classe Bootstrap para mensagem de erro -->
        <div class="invalid-feedback">
          ⚠ Por favor, insira um e-mail válido
        </div>
      </div>

      <!-- Campo Senha -->
      <div class="mb-3">
        <label for="senha" class="form-label">senha</label>
        <input 
          type="password" 
          class="form-control" 
          id="senha" 
          placeholder="••••••••" 
          required 
          minlength="6">
        <div class="invalid-feedback">
          ⚠ Senha deve ter no mínimo 6 caracteres
        </div>
      </div>

      <!-- Checkbox Lembrar-me -->
      <!-- form-check: classe Bootstrap obrigatória para container de checkbox -->
      <div class="mb-4 form-check">
        <!-- form-check-input: classe Bootstrap obrigatória para checkbox -->
        <input 
          type="checkbox" 
          class="form-check-input" 
          id="lembrar">
        <!-- form-check-label: classe Bootstrap obrigatória para label do checkbox -->
        <label class="form-check-label" for="lembrar">
          lembrar-me neste dispositivo
        </label>
      </div>

      <!-- Botão Submit -->
      <button type="submit" class="btn btn-custom w-100">
        entrar
      </button>

    </form>

    <!-- Link de Registro -->
    <div class="register-link">
      não tem conta? <a href="#">registre-se aqui</a>
    </div>

  </div>

  <footer>
    formulário — bootstrap 5 | paola machado | senai 2025
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // JavaScript para validação Bootstrap customizada
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      event.stopPropagation();

      // Remove classes de validação anteriores
      emailInput.classList.remove('is-invalid');
      senhaInput.classList.remove('is-invalid');
      
      const feedbacks = document.querySelectorAll('.invalid-feedback');
      feedbacks.forEach(f => f.classList.remove('show'));

      let isValid = true;

      // Valida e-mail
      if (!emailInput.value || !emailInput.validity.valid) {
        emailInput.classList.add('is-invalid');
        emailInput.nextElementSibling.classList.add('show');
        isValid = false;
      }

      // Valida senha
      if (!senhaInput.value || senhaInput.value.length < 6) {
        senhaInput.classList.add('is-invalid');
        senhaInput.nextElementSibling.classList.add('show');
        isValid = false;
      }

      // Se válido, simula login
      if (isValid) {
        alert('✓ Login realizado com sucesso!\n\nE-mail: ' + emailInput.value);
        form.reset();
      }
    });

    // Remove validação ao digitar
    emailInput.addEventListener('input', function() {
      if (this.classList.contains('is-invalid')) {
        this.classList.remove('is-invalid');
        this.nextElementSibling.classList.remove('show');
      }
    });

    senhaInput.addEventListener('input', function() {
      if (this.classList.contains('is-invalid')) {
        this.classList.remove('is-invalid');
        this.nextElementSibling.classList.remove('show');
      }
    });
  </script>

</body>
</html>
