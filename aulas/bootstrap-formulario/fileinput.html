<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>file input upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 3rem 0 4rem;
      min-height: 100vh;
    }
    .form-box {
      background-color: #111118;
      border: 1px solid rgba(0, 245, 212, 0.3);
      border-radius: 12px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease both;
    }
    .form-box h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box h1 span { 
      color: #00f5d4;
      text-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
    }
    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ff2d78;
      margin-bottom: 0.6rem;
      display: block;
      font-weight: 600;
    }
    .form-control[type="file"] {
      background-color: #1a0a1e;
      border: 2px dashed rgba(255, 45, 120, 0.4);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      padding: 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-control[type="file"]:hover {
      border-color: #ff2d78;
      background-color: rgba(255, 45, 120, 0.08);
      transform: translateY(-2px);
    }
    .form-control[type="file"]:focus {
      background-color: #1a0a1e;
      border-color: #ff2d78;
      color: #f0f0f0;
      box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.15), 0 0 25px rgba(255, 45, 120, 0.5);
      outline: none;
      transform: translateY(-2px);
    }
    .form-control[type="file"]::file-selector-button {
      background: linear-gradient(135deg, #ff2d78, #ff6b9d);
      border: none;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.7rem 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 1.2rem;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    .form-control[type="file"]::file-selector-button:hover {
      background: linear-gradient(135deg, #ff6b9d, #ff2d78);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 45, 120, 0.5);
    }
    .file-teal {
      border-color: rgba(0, 245, 212, 0.4);
      background-color: rgba(0, 245, 212, 0.03);
    }
    .file-teal:hover {
      border-color: #00f5d4;
      background-color: rgba(0, 245, 212, 0.08);
    }
    .file-teal:focus {
      border-color: #00f5d4;
      box-shadow: 0 0 0 4px rgba(0, 245, 212, 0.15), 0 0 25px rgba(0, 245, 212, 0.5);
    }
    .file-teal::file-selector-button {
      background: linear-gradient(135deg, #00f5d4, #00d4b8);
      color: #0e0e0e;
    }
    .file-teal::file-selector-button:hover {
      background: linear-gradient(135deg, #00d4b8, #00f5d4);
    }
    .file-preview {
      background: rgba(255, 45, 120, 0.1);
      border: 1px solid rgba(255, 45, 120, 0.3);
      border-radius: 6px;
      padding: 1rem 1.2rem;
      margin-top: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: #ff2d78;
      display: none;
      animation: slideIn 0.4s ease;
    }
    .file-preview.active { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.45);
      margin-top: 0.5rem;
      display: block;
      font-style: italic;
    }
    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.3);
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation: fadeUp 0.8s ease 0.2s both; }
    .delay-2 { animation: fadeUp 0.8s ease 0.4s both; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1><span>file</span><br/>upload input</h1>
      <p class="subtitle">input type="file" estilizado — botão personalizado com preview</p>
      <form>
        <div class="mb-4 delay-1">
          <label for="fileUpload1" class="form-label">upload de imagem</label>
          <input class="form-control" type="file" id="fileUpload1" accept="image/*" required>
          <div class="file-preview" id="preview1">📁 <span id="fileName1"></span></div>
          <div class="form-text">↑ form-control type="file" — aceita apenas imagens</div>
        </div>
        <div class="mb-4 delay-1">
          <label for="fileUpload2" class="form-label" style="color: #00f5d4;">upload de documento</label>
          <input class="form-control file-teal" type="file" id="fileUpload2" accept=".pdf,.doc,.docx">
          <div class="file-preview" id="preview2" style="background: rgba(0, 245, 212, 0.1); border-color: rgba(0, 245, 212, 0.3); color: #00f5d4;">📄 <span id="fileName2"></span></div>
          <div class="form-text">↑ variação teal — aceita PDF e DOC</div>
        </div>
        <div class="mb-4 delay-2">
          <label for="fileUpload3" class="form-label">upload múltiplo</label>
          <input class="form-control" type="file" id="fileUpload3" multiple>
          <div class="file-preview" id="preview3">📦 <span id="fileName3"></span></div>
          <div class="form-text">↑ atributo multiple permite vários arquivos</div>
        </div>
      </form>
    </div>
    <footer>formulário — bootstrap 5 | paola machado | senai 2025</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('fileUpload1').addEventListener('change', function() {
      const preview = document.getElementById('preview1');
      const fileName = document.getElementById('fileName1');
      if (this.files.length > 0) {
        fileName.textContent = this.files[0].name;
        preview.classList.add('active');
      } else {
        preview.classList.remove('active');
      }
    });
    document.getElementById('fileUpload2').addEventListener('change', function() {
      const preview = document.getElementById('preview2');
      const fileName = document.getElementById('fileName2');
      if (this.files.length > 0) {
        fileName.textContent = this.files[0].name;
        preview.classList.add('active');
      } else {
        preview.classList.remove('active');
      }
    });
    document.getElementById('fileUpload3').addEventListener('change', function() {
      const preview = document.getElementById('preview3');
      const fileName = document.getElementById('fileName3');
      if (this.files.length > 0) {
        fileName.textContent = this.files.length === 1 ? this.files[0].name : `${this.files.length} arquivos selecionados`;
        preview.classList.add('active');
      } else {
        preview.classList.remove('active');
      }
    });
  </script>
</body>
</html>
