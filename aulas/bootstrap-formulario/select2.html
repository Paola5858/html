<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>select small — dropdown compacto</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 3rem 0 4rem;
      min-height: 100vh;
    }
    .form-box {
      background-color: #1a0a1e;
      border-left: 5px solid #ff2d78;
      border-radius: 8px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease both;
    }
    .form-box h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box h1 span { 
      color: #ff2d78;
      text-shadow: 0 0 20px rgba(255, 45, 120, 0.5);
    }
    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ff2d78;
      margin-bottom: 0.6rem;
      display: block;
      font-weight: 600;
    }
    .form-select-sm {
      background-color: #111118;
      border: 2px solid rgba(255, 45, 120, 0.5);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 2rem 0.6rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-select-sm:hover {
      border-color: #ff2d78;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(255, 45, 120, 0.2);
    }
    .form-select-sm:focus {
      background-color: #111118;
      border-color: #ff2d78;
      color: #f0f0f0;
      box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.15), 0 0 20px rgba(255, 45, 120, 0.5);
      outline: none;
      transform: translateY(-1px);
    }
    .form-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.45);
      margin-top: 0.5rem;
      font-style: italic;
    }
    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.3);
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation: fadeUp 0.8s ease 0.2s both; }
    .delay-2 { animation: fadeUp 0.8s ease 0.4s both; }
    .delay-3 { animation: fadeUp 0.8s ease 0.6s both; }
  </style>
</head>
<body>

  <div class="container">

    <div class="form-box">
      <h1><span>select</span><br/>small size</h1>
      <p class="subtitle">form-select-sm — dropdown compacto</p>

      <form>
        <div class="mb-4 delay-1">
          <label for="themeSelect" class="form-label">tema da interface</label>
          <select class="form-select-sm" id="themeSelect" style="width: 100%;" required>
            <option selected disabled value="">escolha um tema</option>
            <option value="dark">Dark Mode</option>
            <option value="y2k">Y2K Neon</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="minimal">Minimal</option>
          </select>
          <div class="form-text">↑ form-select-sm aplicado — tamanho pequeno e compacto</div>
        </div>

        <div class="mb-4 delay-2">
          <label for="langSelect" class="form-label">linguagem preferida</label>
          <select class="form-select-sm" id="langSelect" style="width: 100%;" required>
            <option selected disabled value="">selecione</option>
            <option value="js">JavaScript</option>
            <option value="py">Python</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="rust">Rust</option>
          </select>
          <div class="form-text">↑ classe Bootstrap form-select-sm para selects pequenos</div>
        </div>

        <div class="mb-4 delay-3">
          <label for="prioritySelect" class="form-label">prioridade</label>
          <select class="form-select-sm" id="prioritySelect" style="width: 100%;" required>
            <option selected disabled value="">definir prioridade</option>
            <option value="low">Baixa</option>
            <option value="medium">Média</option>
            <option value="high">Alta</option>
            <option value="urgent">Urgente</option>
          </select>
          <div class="form-text">↑ ideal para formulários compactos e filtros</div>
        </div>
      </form>
    </div>

    <footer>
      formulário — bootstrap 5 | paola machado | senai 2025
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
