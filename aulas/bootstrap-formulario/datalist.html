<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>datalist — autocomplete</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>

  <style>
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 2rem 0 4rem;
    }

    .form-box {
      background-color: #111118;
      border: 1px solid rgba(0, 245, 212, 0.25);
      border-radius: 12px;
      padding: 2.5rem;
      margin-bottom: 2rem;
    }

    .form-box h1 {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .form-box h1 span { color: #00f5d4; }

    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2rem;
    }

    label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #00f5d4;
      margin-bottom: 0.5rem;
      display: block;
    }

    .form-control {
      background-color: #1a0a1e;
      border: 1px solid rgba(0, 245, 212, 0.3);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background-color: #1a0a1e;
      border-color: #00f5d4;
      color: #f0f0f0;
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
      outline: none;
    }

    .note {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.4);
      margin-top: 0.5rem;
      font-style: italic;
    }

    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(240,240,240,0.3);
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .fade-in { animation: fadeUp 0.6s ease both; }
    .delay-1 { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="form-box fade-in">
      <h1><span>datalist</span><br/>autocomplete</h1>
      <p class="subtitle">input + datalist — sugestões personalizadas</p>

      <form>
        <div class="mb-4 fade-in delay-1">
          <label for="techInput">tecnologia favorita</label>
          <input class="form-control" list="techOptions" id="techInput" placeholder="digite ou escolha">
          <datalist id="techOptions">
            <option value="HTML5">
            <option value="CSS3">
            <option value="JavaScript">
            <option value="Bootstrap 5">
            <option value="React">
            <option value="Vue.js">
            <option value="Node.js">
          </datalist>
          <div class="note">datalist oferece sugestões enquanto você digita</div>
        </div>

        <div class="mb-4 fade-in delay-1">
          <label for="cityInput">cidade</label>
          <input class="form-control" list="cityOptions" id="cityInput" placeholder="escolha uma cidade">
          <datalist id="cityOptions">
            <option value="São Paulo">
            <option value="Rio de Janeiro">
            <option value="Belo Horizonte">
            <option value="Curitiba">
            <option value="Porto Alegre">
          </datalist>
          <div class="note">dropdown personalizado com list attribute</div>
        </div>
      </form>
    </div>

    <footer>
      formulário — bootstrap 5 | paola machado | senai 2025
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
