<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>select large — dropdown</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 3rem 0 4rem;
      min-height: 100vh;
    }
    .form-box {
      background: linear-gradient(135deg, #0f0a00, #001a12);
      border-radius: 8px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease both;
    }
    .form-box h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box h1 span { 
      color: #ffe600;
      text-shadow: 0 0 20px rgba(255, 230, 0, 0.5);
    }
    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffe600;
      margin-bottom: 0.6rem;
      display: block;
      font-weight: 600;
    }
    .form-select-lg {
      background-color: #111118;
      border: 2px solid rgba(255, 230, 0, 0.5);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 1.05rem;
      padding: 1.1rem 2.5rem 1.1rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-select-lg:hover {
      border-color: #ffe600;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 230, 0, 0.2);
    }
    .form-select-lg:focus {
      background-color: #111118;
      border-color: #ffe600;
      color: #f0f0f0;
      box-shadow: 0 0 0 4px rgba(255, 230, 0, 0.15), 0 0 25px rgba(255, 230, 0, 0.5);
      outline: none;
      transform: translateY(-2px);
    }
    .form-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.45);
      margin-top: 0.5rem;
      font-style: italic;
    }
    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.3);
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation: fadeUp 0.8s ease 0.2s both; }
    .delay-2 { animation: fadeUp 0.8s ease 0.4s both; }
  </style>
</head>
<body>

  <div class="container">

    <div class="form-box">
      <h1><span>select</span><br/>large size</h1>
      <p class="subtitle">form-select-lg — dropdown tamanho grande</p>

      <form>
        <div class="mb-4 delay-1">
          <label for="courseSelect" class="form-label">escolha seu curso</label>
          <select class="form-select-lg" id="courseSelect" style="width: 100%;" required>
            <option selected disabled value="">selecione uma opção</option>
            <option value="1">Desenvolvimento de Sistemas</option>
            <option value="2">Redes de Computadores</option>
            <option value="3">Design Gráfico</option>
            <option value="4">Automação Industrial</option>
          </select>
          <div class="form-text">↑ form-select-lg aplicado — tamanho grande com glow neon</div>
        </div>

        <div class="mb-4 delay-2">
          <label for="levelSelect" class="form-label">nível de experiência</label>
          <select class="form-select-lg" id="levelSelect" style="width: 100%;" required>
            <option selected disabled value="">escolha seu nível</option>
            <option value="iniciante">Iniciante</option>
            <option value="intermediario">Intermediário</option>
            <option value="avancado">Avançado</option>
            <option value="expert">Expert</option>
          </select>
          <div class="form-text">↑ classe Bootstrap form-select-lg para selects grandes</div>
        </div>
      </form>
    </div>

    <footer>
      formulário — bootstrap 5 | paola machado | senai 2025
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
