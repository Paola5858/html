<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>color picker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 3rem 0 4rem;
      min-height: 100vh;
    }
    .form-box {
      background: linear-gradient(135deg, #0f0a00, #001a12);
      border-radius: 8px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease both;
    }
    .form-box h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box h1 span { 
      color: #ffe600;
      text-shadow: 0 0 20px rgba(255, 230, 0, 0.5);
    }
    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffe600;
      margin-bottom: 0.6rem;
      display: block;
      font-weight: 600;
    }
    .color-picker-wrapper {
      background-color: #111118;
      border: 2px solid rgba(255, 230, 0, 0.4);
      border-radius: 8px;
      padding: 1.8rem;
      display: flex;
      align-items: center;
      gap: 1.8rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .color-picker-wrapper:hover {
      border-color: #ffe600;
      box-shadow: 0 0 25px rgba(255, 230, 0, 0.3);
      transform: translateY(-2px);
    }
    .form-control-color {
      width: 90px;
      height: 90px;
      border: 3px solid rgba(255, 230, 0, 0.6);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .form-control-color:hover {
      transform: scale(1.05);
      border-color: #ffe600;
    }
    .form-control-color:focus {
      border-color: #ffe600;
      box-shadow: 0 0 0 4px rgba(255, 230, 0, 0.2), 0 0 30px rgba(255, 230, 0, 0.6);
      outline: none;
      transform: scale(1.05);
    }
    .color-preview { flex: 1; }
    .color-preview .label-small {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,240,240,0.5);
      margin-bottom: 0.6rem;
    }
    .color-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffe600;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }
    .color-display {
      width: 100%;
      height: 70px;
      border-radius: 6px;
      margin-top: 1rem;
      border: 2px solid rgba(255, 230, 0, 0.4);
      transition: all 0.4s ease;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    }
    .picker-pink .color-picker-wrapper {
      border-color: rgba(255, 45, 120, 0.4);
    }
    .picker-pink .color-picker-wrapper:hover {
      border-color: #ff2d78;
      box-shadow: 0 0 25px rgba(255, 45, 120, 0.3);
    }
    .picker-pink .form-control-color {
      border-color: rgba(255, 45, 120, 0.6);
    }
    .picker-pink .form-control-color:focus {
      border-color: #ff2d78;
      box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.2), 0 0 30px rgba(255, 45, 120, 0.6);
    }
    .picker-pink .color-value { color: #ff2d78; }
    .picker-pink .color-display { border-color: rgba(255, 45, 120, 0.4); }
    .form-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.45);
      margin-top: 0.5rem;
      font-style: italic;
    }
    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.3);
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation: fadeUp 0.8s ease 0.2s both; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1><span>color</span><br/>picker input</h1>
      <p class="subtitle">input type="color" com preview dinâmico animado</p>
      <form>
        <div class="mb-4 delay-1">
          <label for="colorPicker1" class="form-label">escolha uma cor</label>
          <div class="color-picker-wrapper">
            <input type="color" class="form-control-color" id="colorPicker1" value="#ffe600">
            <div class="color-preview">
              <div class="label-small">valor hexadecimal</div>
              <div class="color-value" id="colorValue1">#ffe600</div>
              <div class="color-display" id="colorDisplay1" style="background-color: #ffe600;"></div>
            </div>
          </div>
          <div class="form-text">↑ form-control-color com preview em tempo real</div>
        </div>
        <div class="mb-4 delay-1 picker-pink">
          <label for="colorPicker2" class="form-label" style="color: #ff2d78;">cor secundária</label>
          <div class="color-picker-wrapper">
            <input type="color" class="form-control-color" id="colorPicker2" value="#ff2d78">
            <div class="color-preview">
              <div class="label-small">valor hexadecimal</div>
              <div class="color-value" id="colorValue2">#ff2d78</div>
              <div class="color-display" id="colorDisplay2" style="background-color: #ff2d78;"></div>
            </div>
          </div>
          <div class="form-text">↑ variação rosa com animação sincronizada</div>
        </div>
      </form>
    </div>
    <footer>formulário — bootstrap 5 | paola machado | senai 2025</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const colorPicker1 = document.getElementById('colorPicker1');
    const colorValue1 = document.getElementById('colorValue1');
    const colorDisplay1 = document.getElementById('colorDisplay1');
    colorPicker1.addEventListener('input', function() {
      const color = this.value;
      colorValue1.textContent = color;
      colorDisplay1.style.backgroundColor = color;
    });
    const colorPicker2 = document.getElementById('colorPicker2');
    const colorValue2 = document.getElementById('colorValue2');
    const colorDisplay2 = document.getElementById('colorDisplay2');
    colorPicker2.addEventListener('input', function() {
      const color = this.value;
      colorValue2.textContent = color;
      colorDisplay2.style.backgroundColor = color;
    });
  </script>
</body>
</html>
