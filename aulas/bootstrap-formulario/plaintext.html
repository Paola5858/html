<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>plaintext readonly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0e0e0e;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      padding: 3rem 0 4rem;
      min-height: 100vh;
    }
    .form-box {
      background-color: #1a0a1e;
      border-left: 5px solid #ff2d78;
      border-radius: 8px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease both;
    }
    .form-box h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box h1 span { 
      color: #ff2d78;
      text-shadow: 0 0 20px rgba(255, 45, 120, 0.5);
    }
    .form-box .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: rgba(240,240,240,0.5);
      margin-bottom: 2.5rem;
    }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #00f5d4;
      margin-bottom: 0.6rem;
      display: block;
      font-weight: 600;
    }
    .form-control {
      background-color: #111118;
      border: 2px solid rgba(0, 245, 212, 0.3);
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.85rem 1.2rem;
      border-radius: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-control:hover {
      border-color: rgba(0, 245, 212, 0.5);
      transform: translateY(-1px);
    }
    .form-control:focus {
      background-color: #111118;
      border-color: #00f5d4;
      color: #f0f0f0;
      box-shadow: 0 0 0 4px rgba(0, 245, 212, 0.15), 0 0 25px rgba(0, 245, 212, 0.4);
      outline: none;
      transform: translateY(-2px);
    }
    .form-control-plaintext {
      background-color: rgba(255, 45, 120, 0.05);
      border: 2px dashed rgba(255, 45, 120, 0.4);
      color: rgba(240, 240, 240, 0.8);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.85rem 1.2rem;
      border-radius: 6px;
      cursor: not-allowed;
      transition: all 0.3s ease;
    }
    .form-control-plaintext:hover {
      background-color: rgba(255, 45, 120, 0.08);
      border-color: rgba(255, 45, 120, 0.6);
    }
    .form-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,240,240,0.45);
      margin-top: 0.5rem;
      display: block;
      font-style: italic;
    }
    .badge-readonly {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border: 1.5px solid #ff2d78;
      color: #ff2d78;
      border-radius: 3px;
      display: inline-block;
      margin-left: 0.6rem;
      background: rgba(255, 45, 120, 0.1);
    }
    footer {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(240,240,240,0.3);
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.1em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation: fadeUp 0.8s ease 0.2s both; }
    .delay-2 { animation: fadeUp 0.8s ease 0.4s both; }
    .delay-3 { animation: fadeUp 0.8s ease 0.6s both; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1><span>plaintext</span><br/>readonly fields</h1>
      <p class="subtitle">campos somente leitura — form-control-plaintext em ação</p>
      <form>
        <div class="mb-4 delay-1">
          <label for="editableField" class="form-label">campo editável</label>
          <input type="text" class="form-control" id="editableField" placeholder="você pode digitar aqui" required>
          <div class="form-text">↑ form-control — input padrão editável</div>
        </div>
        <div class="mb-4 delay-2">
          <label for="readonlyField" class="form-label">
            campo readonly
            <span class="badge-readonly">somente leitura</span>
          </label>
          <input type="text" readonly class="form-control-plaintext" id="readonlyField" value="paola.machado@senai.br">
          <div class="form-text">↑ form-control-plaintext — não pode ser editado</div>
        </div>
        <div class="mb-4 delay-3">
          <label for="idField" class="form-label">
            id do usuário
            <span class="badge-readonly">fixo</span>
          </label>
          <input type="text" readonly class="form-control-plaintext" id="idField" value="USR-2025-7834">
          <div class="form-text">↑ ideal para exibir dados fixos</div>
        </div>
      </form>
    </div>
    <footer>formulário — bootstrap 5 | paola machado | senai 2025</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
